name: Android CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "**/*.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError"
  APP_NAME: "Klyx"
  APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;29.0.14206865"

      - name: Install CMake
        run: |
          CMAKE_VERSION=4.3.2
          wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz
          tar -xzf cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz
          echo "cmake.dir=$PWD/cmake-${CMAKE_VERSION}-linux-x86_64" >> local.properties
          echo "$PWD/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> $GITHUB_PATH
          "$PWD/cmake-${CMAKE_VERSION}-linux-x86_64/bin/cmake" --version

      - name: Restore keystore
        run: |
          echo "${{ secrets.KLYX_KEYSTORE }}" | base64 -d > /tmp/klyx.keystore

      - name: Restore signing properties
        run: |
          echo "${{ secrets.KEYSTORE_PROP }}" | base64 -d > /tmp/sign.properties

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare TreeSitter bindings
        run: ./gradlew prepareTreeSitter

      - name: Build Release APK
        env:
          CI: true
          CI_PROVIDER: github

          CI_WORKFLOW: ${{ github.workflow }}
          CI_JOB: ${{ github.job }}
          CI_RUN_ID: ${{ github.run_id }}
          CI_RUN_NUMBER: ${{ github.run_number }}
          CI_ATTEMPT: ${{ github.run_attempt }}
          CI_ACTOR: ${{ github.actor }}
          CI_EVENT: ${{ github.event_name }}

          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_TYPE: ${{ github.ref_type }}
          GIT_REPO: ${{ github.repository }}
          GIT_REPO_OWNER: ${{ github.repository_owner }}

          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}

          CI_OS: ${{ runner.os }}
          CI_ARCH: ${{ runner.arch }}

          KLYX_STORE_API_KEY: ${{ secrets.KLYX_STORE_API_KEY }}

          ENABLE_STRICT_MODE: false
          ENABLE_EXPERIMENTAL: true

        run: |
          ./gradlew assembleRelease

      - name: Collect APKs
        run: |
          mkdir -p artifacts

          find app/build/outputs/apk -type f -name "*.apk" -exec cp {} artifacts/ \;

          echo "Found APKs:"
          ls -lah artifacts

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-arm64-v8a
          path: artifacts/*arm64-v8a*.apk
          retention-days: 15
          if-no-files-found: ignore

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-x86_64
          path: artifacts/*x86_64*.apk
          retention-days: 15
          if-no-files-found: ignore

      - name: Upload Universal APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-universal
          path: artifacts/*universal*.apk
          retention-days: 15
          if-no-files-found: ignore

      - name: Cleanup sensitive files
        if: always()
        run: rm -f /tmp/klyx.keystore /tmp/sign.properties

  publish-snapshot:
    name: Publish SNAPSHOT
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;29.0.14206865"

      - name: Install CMake
        run: |
          CMAKE_VERSION=4.3.2
          wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz
          tar -xzf cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz
          echo "cmake.dir=$PWD/cmake-${CMAKE_VERSION}-linux-x86_64" >> local.properties
          echo "$PWD/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> $GITHUB_PATH
          "$PWD/cmake-${CMAKE_VERSION}-linux-x86_64/bin/cmake" --version

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare TreeSitter bindings
        run: ./gradlew prepareTreeSitter

      - name: Prepare signing key
        run: echo "${{ secrets.MAVEN_SIGNING_SECRET_KEY }}" | base64 -d > /tmp/secring.gpg

      - name: Publish SHA-pinned SNAPSHOT
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingSecretKeyRingFile: /tmp/secring.gpg
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BASE_VERSION=$(grep 'project.version=' gradle.properties | cut -d= -f2)
          ./gradlew :klyx-api:publishToMavenCentral :klyx-gradle-plugin:publishToMavenCentral :core:publishToMavenCentral :terminal:publishToMavenCentral \
            -Pproject.version=${BASE_VERSION}-${SHORT_SHA}-SNAPSHOT

      - name: Publish latest SNAPSHOT (overwrites previous)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingSecretKeyRingFile: /tmp/secring.gpg
        run: |
          BASE_VERSION=$(grep 'project.version=' gradle.properties | cut -d= -f2)
          ./gradlew :klyx-api:publishToMavenCentral :klyx-gradle-plugin:publishToMavenCentral :core:publishToMavenCentral :terminal:publishToMavenCentral \
            -Pproject.version=${BASE_VERSION}-SNAPSHOT
